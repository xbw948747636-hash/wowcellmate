<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔兽世界 · 史诗大秘境查询</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-bg"></div>
            <div class="header-content">
                <div class="logo-area">
                    <span class="logo-icon"></span>
                    <h1 class="app-title">史诗大秘境查询</h1>
                </div>
                <p class="app-subtitle">查询当前赛季角色限时通关最高层数与总分数</p>
                <p class="app-version">魔兽世界正式服 · 至暗之夜</p>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-card">
                <div class="search-input-wrapper">
                    <input
                        id="searchInput"
                        type="text"
                        class="search-input"
                        placeholder="输入 角色名-服务器名（如：张三-死亡之翼）"
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="searchBtn" class="search-btn">
                        <span class="btn-icon"></span>
                        <span class="btn-text">搜索</span>
                    </button>
                </div>
                <p class="search-hint">按格式输入：<strong>角色名称-服务器名称</strong>，中间用短横线连接</p>
            </div>
        </section>

        <!-- Quick Search Presets -->
        <section class="presets-section">
            <span class="presets-label">快速查询</span>
            <div class="presets-grid">
                <div class="preset-card" data-query="绿码的土拨鼠-末日行者">
                    <span class="preset-char-name">绿码的土拨鼠</span>
                    <span class="preset-realm">末日行者</span>
                </div>
                <div class="preset-card" data-query="贴贴赛高-末日行者">
                    <span class="preset-char-name">贴贴赛高</span>
                    <span class="preset-realm">末日行者</span>
                </div>
                <div class="preset-card" data-query="贴贴图腾-末日行者">
                    <span class="preset-char-name">贴贴图腾</span>
                    <span class="preset-realm">末日行者</span>
                </div>
                <div class="preset-card" data-query="土拨鼠的天敌-凤凰之神">
                    <span class="preset-char-name">土拨鼠的天敌</span>
                    <span class="preset-realm">凤凰之神</span>
                </div>
                <div class="preset-card" data-query="咪莎-德拉诺">
                    <span class="preset-char-name">咪莎</span>
                    <span class="preset-realm">德拉诺</span>
                </div>
                <div class="preset-card" data-query="贴贴无敌-末日行者">
                    <span class="preset-char-name">贴贴无敌</span>
                    <span class="preset-realm">末日行者</span>
                </div>
                <div class="preset-card" data-query="六跪而二螯-凤凰之神">
                    <span class="preset-char-name">六跪而二螯</span>
                    <span class="preset-realm">凤凰之神</span>
                </div>
            </div>
        </section>

        <!-- Status Section -->
        <section id="statusSection" class="status-section" style="display:none;">
            <div id="loadingState" class="status-state" style="display:none;">
                <div class="loading-spinner"></div>
                <p class="loading-text">正在查询角色数据...</p>
            </div>
            <div id="errorState" class="status-state" style="display:none;">
                <div class="error-card">
                    <span class="error-icon">!</span>
                    <h3 class="error-title">查询失败</h3>
                    <p id="errorMessage" class="error-message"></p>
                </div>
            </div>
        </section>

        <!-- Results Section -->
        <section id="resultsSection" class="results-section" style="display:none;">
            <!-- Character Info -->
            <div class="char-card">
                <div class="char-identity">
                    <img id="charThumbnail" class="char-thumb" src="" alt="" onerror="this.style.display='none'">
                    <div class="char-info">
                        <h2 id="charName" class="char-name"></h2>
                        <p id="charDetail" class="char-detail"></p>
                    </div>
                </div>
                <div class="char-meta">
                    <div class="meta-item">
                        <span class="meta-label">装等</span>
                        <span id="charIlvl" class="meta-value"></span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">专精</span>
                        <span id="charSpec" class="meta-value"></span>
                    </div>
                    <a id="charProfileLink" class="profile-link" href="#" target="_blank" rel="noopener">
                        Raider.io 主页 ↗
                    </a>
                </div>
            </div>

            <!-- Score Overview -->
            <div class="score-card">
                <div class="score-main">
                    <span class="score-label">大秘境总分数</span>
                    <span id="totalScore" class="score-value">0</span>
                </div>
                <div class="score-roles" id="scoreRoles"></div>
            </div>

            <!-- Dungeon Runs -->
            <div class="dungeons-section">
                <h3 class="dungeons-title">最佳通关记录</h3>
                <div id="dungeonsGrid" class="dungeons-grid"></div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="app-footer">
            <p>数据来源：Raider.io &nbsp;|&nbsp; 仅支持中国大陆魔兽世界正式服</p>
        </footer>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
